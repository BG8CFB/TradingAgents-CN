# TradingAgents-CN 开发模式 Docker Compose
# 特性：后端热重载（uvicorn --reload）、前端 HMR（Vite dev server）
#
# 使用方法：
#   docker compose -f docker-compose.dev.yml up --build
#   后台运行：docker compose -f docker-compose.dev.yml up --build -d
#   仅重建某个服务：docker compose -f docker-compose.dev.yml up --build -d backend
#
# 访问地址：
#   前端（Vite HMR）：http://localhost:3000
#   后端 API：http://localhost:8000/docs
#   Nginx 统一入口：http://localhost:3080

services:
  mongodb:
    image: docker.m.daocloud.io/library/mongo:7.0
    container_name: tradingagents-mongodb
    restart: unless-stopped
    volumes:
      - tradingagents_mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-tradingagents123}
      MONGO_INITDB_DATABASE: tradingagents
      TZ: "Asia/Shanghai"
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - tradingagents-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: tradingagents-redis
    restart: unless-stopped
    volumes:
      - tradingagents_redis_data:/data
    environment:
      TZ: "Asia/Shanghai"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-tradingagents123}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - tradingagents-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-tradingagents123}", "ping"]
      # 注意：-a 参数会将密码暴露在进程列表中。
      # TODO(安全): 改用 REDISCLI_AUTH 环境变量避免密码泄露：
      #   environment:
      #     REDISCLI_AUTH: ${REDIS_PASSWORD:-tradingagents123}
      #   healthcheck:
      #     test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: tradingagents-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 🔥 核心开发挂载：源码热重载
      - ./app:/app/app
      # 运行时产物持久化
      - ./runtime:/app/runtime
      # 用户配置持久化
      - ./config:/app/config
      # pyproject.toml 变更后 pip install 生效（首次构建时安装）
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
    env_file:
      - .env
    environment:
      TZ: "Asia/Shanghai"
      TRADINGAGENTS_LOG_LEVEL: "DEBUG"
      TRADINGAGENTS_LOG_DIR: "/app/runtime/logs"
      TRADINGAGENTS_LOG_FILE: "/app/runtime/logs/tradingagents.log"
      MONGODB_HOST: "mongodb"
      MONGODB_PORT: "27017"
      MONGODB_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-tradingagents123}
      MONGODB_DATABASE: "tradingagents"
      MONGODB_AUTH_SOURCE: "admin"
      MONGODB_URL: "mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGODB_PASSWORD:-tradingagents123}@mongodb:27017/tradingagents?authSource=admin"
      MONGODB_CONNECTION_STRING: "mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGODB_PASSWORD:-tradingagents123}@mongodb:27017/tradingagents?authSource=admin"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-tradingagents123}
      REDIS_URL: "redis://:${REDIS_PASSWORD:-tradingagents123}@redis:6379/0"
      DOCKER_CONTAINER: "true"
      MCP_CONFIG_PATH: "/app/config/mcp.json"
      AGENT_CONFIG_DIR: "/app/config/agents"
      JWT_SECRET: ${JWT_SECRET:-docker-jwt-secret-key-change-in-production-2024}
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      CSRF_SECRET: ${CSRF_SECRET:-docker-csrf-secret-key-change-in-production-2024}
      BCRYPT_ROUNDS: "12"
      ALLOWED_ORIGINS: "*"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY}"
      DASHSCOPE_ENABLED: "${DASHSCOPE_ENABLED:-false}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      DEEPSEEK_ENABLED: "${DEEPSEEK_ENABLED:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_ENABLED: "${OPENAI_ENABLED:-false}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      GOOGLE_ENABLED: "${GOOGLE_ENABLED:-false}"
      BAIDU_API_KEY: "${BAIDU_API_KEY}"
      BAIDU_SECRET_KEY: "${BAIDU_SECRET_KEY}"
      BAIDU_ENABLED: "${BAIDU_ENABLED:-false}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_ENABLED: "${OPENROUTER_ENABLED:-false}"
      TUSHARE_TOKEN: "${TUSHARE_TOKEN}"
      TUSHARE_ENABLED: "${TUSHARE_ENABLED:-false}"
      AKSHARE_ENABLED: "${AKSHARE_ENABLED:-true}"
      BAOSTOCK_ENABLED: "${BAOSTOCK_ENABLED:-true}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY}"
      FINNHUB_ENABLED: "${FINNHUB_ENABLED:-false}"
      # 首次初始化管理员密码（首次启动后可移除）
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
    # 🔥 开发模式：uvicorn --reload，修改 Python 文件后自动重启
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tradingagents-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: docker.m.daocloud.io/library/node:22-alpine
    container_name: tradingagents-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    ports:
      - "3000:3000"
    volumes:
      # 🔥 核心开发挂载：源码 HMR 热更新
      - ./frontend:/app/frontend
      # 使用匿名卷保护 node_modules，防止宿主机覆盖
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      TZ: "Asia/Shanghai"
      # Docker 内 Vite 代理目标（覆盖 localhost，使用 Docker 服务名）
      API_PROXY_TARGET: "http://backend:8000"
      CHOKIDAR_USEPOLLING: "true"
    # 🔥 开发模式：Vite dev server + HMR（使用 npmmirror 国内源加速）
    command: ["sh", "-c", "npm config set registry https://registry.npmmirror.com && npm install && npx vite --host 0.0.0.0 --port 3000"]
    depends_on:
      - backend
    networks:
      - tradingagents-network

volumes:
  tradingagents_mongodb_data:
    driver: local
  tradingagents_redis_data:
    driver: local
  frontend_node_modules:

networks:
  tradingagents-network:
    driver: bridge
