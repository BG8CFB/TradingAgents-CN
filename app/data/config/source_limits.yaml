  requires_token: true
  token_env_var: TUSHARE_HK_TOKEN

tushare_us:
  rate_per_minute: 200
  polite_interval_ms: 300
  circuit_initial_cooldown: 60
  circuit_max_cooldown: 600
  requires_token: true
  token_env_var: TUSHARE_US_TOKEN

