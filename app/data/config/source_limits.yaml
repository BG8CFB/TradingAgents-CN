# 各数据源限流参数

tushare:
  rate_per_minute: 200
  polite_interval_ms: 300
  circuit_initial_cooldown: 60
  circuit_max_cooldown: 600
  requires_token: true
  token_env_var: TUSHARE_CN_TOKEN

tushare_hk:
  rate_per_minute: 200
  polite_interval_ms: 300
