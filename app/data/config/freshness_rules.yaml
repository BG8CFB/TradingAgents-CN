# 各数据域新鲜度规则: market → domain → rule

CN:
  daily_quotes:
    rule_type: trading_day_after_close
    threshold_minutes: 30
    reference_time: "15:00"
  daily_indicators:
    rule_type: trading_day_after_close
    threshold_minutes: 60
    reference_time: "15:00"
  basic_info:
    rule_type: time_window
    threshold_hours: 24
  financial_data:
    rule_type: time_window
    threshold_hours: 168  # 7 天
  news:
    rule_type: time_window
    threshold_hours: 2
  market_quotes:
    rule_type: time_window
    threshold_minutes: 30

