name: Test & Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docker/Dockerfile.backend'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docker/Dockerfile.backend'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv
          uv --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio hypothesis httpx

      - name: Run all tests
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          load: true
          tags: tradingagents-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm tradingagents-backend:test python -c "from app.engine.tools.mcp.config_utils import MCPServerConfig; print('MCP module loaded successfully')"
          docker run --rm tradingagents-backend:test uvx --version || echo "uvx check"
          docker run --rm tradingagents-backend:test node --version
