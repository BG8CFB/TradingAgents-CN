name: Test & Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docker/Dockerfile.backend'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docker/Dockerfile.backend'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: tradingagents123
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' -u admin -p tradingagents123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_HOST: localhost
      MONGODB_PORT: 27017
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: tradingagents123
      MONGODB_DATABASE: tradingagents_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv
          uv --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-asyncio hypothesis httpx

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -m "not slow and not ai"

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          load: true
          tags: tradingagents-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm tradingagents-backend:test python -c "from app.engine.tools.mcp.config_utils import MCPServerConfig; print('MCP module loaded successfully')"
          docker run --rm tradingagents-backend:test uvx --version || echo "uvx check"
          docker run --rm tradingagents-backend:test node --version
