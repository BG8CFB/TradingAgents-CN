name: Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'config/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: tradingagents123
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' -u admin -p tradingagents123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_HOST: localhost
      MONGODB_PORT: 27017
      MONGODB_USERNAME: admin
      MONGODB_PASSWORD: tradingagents123
      MONGODB_DATABASE: tradingagents_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # 修复 protobuf 与 google-generativeai 等包的版本兼容性
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          pip install uv
          uv --version

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install -e .
          uv pip install pytest pytest-asyncio hypothesis httpx

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v --tb=short -m "not slow and not ai"
