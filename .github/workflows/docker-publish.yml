name: Docker Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# GHCR 镜像名必须全小写，而 GitHub 用户名可能含大写字母。
# 在 job level 用 step 把 owner 转小写后赋给 JOB_ENV，避免硬编码。
jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: docker/Dockerfile.backend
            platform: linux/amd64
            runner: ubuntu-latest
            slug: linux-amd64
          - image: backend
            dockerfile: docker/Dockerfile.backend
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: linux-arm64
          - image: frontend
            dockerfile: docker/Dockerfile.frontend
            platform: linux/amd64
            runner: ubuntu-latest
            slug: linux-amd64
          - image: frontend
            dockerfile: docker/Dockerfile.frontend
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image names
        id: ref
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "name=ghcr.io/${OWNER_LC}/tradingagents-backend" >> "$GITHUB_OUTPUT"
          else
            echo "name=ghcr.io/${OWNER_LC}/tradingagents-frontend" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by-digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          outputs: type=image,name=${{ steps.ref.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.slug }}

      - name: Export digest artifact
        run: |
          mkdir -p ./digests
          echo "${{ steps.build.outputs.digest }}" > "./digests/${{ matrix.image }}-${{ matrix.slug }}.txt"
          cat "./digests/${{ matrix.image }}-${{ matrix.slug }}.txt"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.slug }}
          path: ./digests/${{ matrix.image }}-${{ matrix.slug }}.txt
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.image }} manifest
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - name: Resolve lowercase image name
        id: ref
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "name=ghcr.io/${OWNER_LC}/tradingagents-backend" >> "$GITHUB_OUTPUT"
          else
            echo "name=ghcr.io/${OWNER_LC}/tradingagents-frontend" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all digests for ${{ matrix.image }}
        uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.image }}-*
          path: ./digests
          merge-multiple: true

      - name: Assemble manifest sources
        id: sources
        run: |
          set -e
          MANIFEST_SOURCES=""
          while IFS= read -r f; do
            d=$(tr -d '[:space:]' < "$f")
            MANIFEST_SOURCES="$MANIFEST_SOURCES ${{ steps.ref.outputs.name }}@$d"
          done < <(ls ./digests/*.txt)
          echo "sources=$MANIFEST_SOURCES" >> "$GITHUB_OUTPUT"
          echo "Manifest sources:$MANIFEST_SOURCES"

      - name: Resolve tag
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ref.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Create multi-arch manifest
        run: |
          set -e
          TAG_ARGS=""
          IFS=',' read -ra TAG_LIST <<< "${{ steps.tag.outputs.tags }}"
          for t in "${TAG_LIST[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $t"
          done
          echo "Creating manifest with tags: $TAG_ARGS"
          echo "Sources:${{ steps.sources.outputs.sources }}"
          docker buildx imagetools create $TAG_ARGS ${{ steps.sources.outputs.sources }}

      - name: Inspect final image
        run: |
          for t in $(echo '${{ steps.tag.outputs.tags }}' | tr ',' ' '); do
            echo "=== $t ==="
            docker buildx imagetools inspect "$t" || true
          done
